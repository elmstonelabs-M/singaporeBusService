services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/bus_app
      REDIS_URL: redis://redis:6379/0
      TZ: ${APP_TIMEZONE:-Asia/Singapore}
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bus_app
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      TZ: ${APP_TIMEZONE:-Asia/Singapore}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Singapore}
    ports:
      - "16379:6379"

volumes:
  postgres_data:
